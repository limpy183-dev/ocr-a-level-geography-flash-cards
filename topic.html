<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards — Topic</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>

    <div class="page-wrapper">
        <nav class="nav-bar">
            <a href="index.html">← All Topics</a>

            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme"
                style="margin-left:auto; margin-right:0;">
                <span id="theme-icon">🌙</span>
            </button>
        </nav>

        <header class="topic-page-header">
            <span class="topic-emoji" id="topic-emoji"></span>
            <h1 id="topic-name"></h1>
            <p class="subtitle" id="topic-count"></p>
        </header>

        <!-- Controls -->
        <div class="controls-bar">
            <!-- FSRS Toggle Topic -->
            <label class="fsrs-toggle-label"
                style="display:flex; align-items:center; gap:0.5rem; color:var(--text-main); font-size:0.875rem; font-weight:600; cursor:pointer; margin-right:auto;">
                <input type="checkbox" id="fsrs-mode-toggle" onchange="toggleFSRS()">
                <span class="fsrs-track"
                    style="position:relative; width:36px; height:20px; background:var(--bg-layer-2); border-radius:99px; transition:0.3s; border:1px solid var(--border-color);">
                    <span class="fsrs-thumb"
                        style="position:absolute; top:2px; left:2px; width:14px; height:14px; background:var(--text-muted); border-radius:50%; transition:0.3s;"></span>
                </span>
                FSRS Mode
            </label>

            <button class="ctrl-btn active" id="btn-card-mode" onclick="setMode('card')">🃏 Cards</button>
            <button class="ctrl-btn" id="btn-list-mode" onclick="setMode('list')">📋 List</button>
            <button class="ctrl-btn" id="btn-shuffle" onclick="shuffleDeck()">🔀 Shuffle</button>
            <button class="ctrl-btn accent" id="btn-reset" onclick="resetDeck()">↻ Reset</button>
        </div>

        <!-- Search in topic -->
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="card-search" placeholder="Search terms in this topic...">
        </div>

        <!-- Score -->
        <div class="score-display">
            <span class="score-chip score-known" id="chip-known">✓ Know: <strong id="score-known">0</strong></span>
            <span class="score-chip score-unknown" id="chip-unknown">✗ Don't Know: <strong
                    id="score-unknown">0</strong></span>

            <span class="score-chip score-fsrs-again" id="chip-fsrs-again" style="display:none">Again: <strong
                    id="score-fsrs-again">0</strong></span>
            <span class="score-chip score-fsrs-hard" id="chip-fsrs-hard" style="display:none">Hard: <strong
                    id="score-fsrs-hard">0</strong></span>
            <span class="score-chip score-fsrs-good" id="chip-fsrs-good" style="display:none">Good: <strong
                    id="score-fsrs-good">0</strong></span>
            <span class="score-chip score-fsrs-easy" id="chip-fsrs-easy" style="display:none">Easy: <strong
                    id="score-fsrs-easy">0</strong></span>

            <span class="score-chip score-remaining">Remaining: <strong id="score-remaining">0</strong></span>
        </div>

        <!-- Progress bar -->
        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text">0% complete</p>
        </div>

        <!-- FLASHCARD MODE -->
        <div class="flashcard-mode" id="flashcard-mode">
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="flashcard-face flashcard-front">
                        <span class="flashcard-label">Term</span>
                        <div class="flashcard-term" id="card-term"></div>
                        <span class="flashcard-hint">Click to reveal definition</span>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <span class="flashcard-label">Definition</span>
                        <div class="flashcard-definition" id="card-definition"></div>
                        <span class="flashcard-hint">Click to flip back</span>
                    </div>
                </div>
            </div>

            <!-- Know / Don't Know -->
            <div class="judge-row" id="judge-row">
                <button class="judge-btn judge-dunno" onclick="markCard(false)">✗ Don't Know</button>
                <button class="judge-btn judge-know" onclick="markCard(true)">✓ Know It</button>
            </div>

            <!-- FSRS Ratings -->
            <div class="fsrs-judge-row" id="fsrs-judge-row"
                style="display:none; gap:0.5rem; justify-content:center; flex-wrap:wrap;">
                <button class="fsrs-btn fsrs-again" onclick="markFsrsCard(1)">
                    <span class="fsrs-label">Again</span>
                    <span class="fsrs-time" id="fsrs-time-1">&lt;1m</span>
                </button>
                <button class="fsrs-btn fsrs-hard" onclick="markFsrsCard(2)">
                    <span class="fsrs-label">Hard</span>
                    <span class="fsrs-time" id="fsrs-time-2">&lt;6m</span>
                </button>
                <button class="fsrs-btn fsrs-good" onclick="markFsrsCard(3)">
                    <span class="fsrs-label">Good</span>
                    <span class="fsrs-time" id="fsrs-time-3">&lt;10m</span>
                </button>
                <button class="fsrs-btn fsrs-easy" onclick="markFsrsCard(4)">
                    <span class="fsrs-label">Easy</span>
                    <span class="fsrs-time" id="fsrs-time-4">16d</span>
                </button>
            </div>

            <!-- Nav arrows -->
            <div class="card-nav">
                <button class="nav-arrow" id="btn-prev" onclick="prevCard()">◀</button>
                <div class="card-counter"><span id="current-num">1</span> <span>/ <span id="total-num">0</span></span>
                </div>
                <button class="nav-arrow" id="btn-next" onclick="nextCard()">▶</button>
            </div>
        </div>

        <!-- LIST MODE -->
        <div class="list-mode" id="list-mode"></div>

        <!-- COMPLETION SCREEN -->
        <div class="completion-screen" id="completion-screen">
            <div class="trophy">🏆</div>
            <h2>Deck Complete!</h2>
            <p class="result-text" id="result-text"></p>
            <div class="controls-bar">
                <button class="ctrl-btn accent" onclick="resetDeck()">↻ Study Again</button>
                <button class="ctrl-btn" onclick="reviewUnknown()">📝 Review Unknown</button>
                <a href="index.html" class="ctrl-btn" style="text-decoration:none">← Return to Dashboard</a>
            </div>
        </div>

        <footer class="main-footer">
            Geography Revision — Flashcard App 📖
        </footer>
    </div>

    <!-- Scroll to top -->
    <button class="scroll-top-btn" id="scroll-top">↑</button>

    <script src="data.js"></script>
    <script src="fsrs.js"></script>
    <script src="auth.js"></script>
    <script>
        // === STATE ===
        const params = new URLSearchParams(window.location.search);
        const topicId = parseInt(params.get('id')) || 0;
        const topic = FLASHCARD_DATA[topicId];

        let isFSRS = localStorage.getItem('fsrs_mode') === 'true';
        let fullDeck = [...topic.cards];
        let deck = [...fullDeck];
        let currentIndex = 0;
        let known = new Set();
        let unknown = new Set();
        let fsrsRatings = { 1: new Set(), 2: new Set(), 3: new Set(), 4: new Set() };
        let mode = 'card'; // 'card' or 'list'

        // === INIT ===
        document.title = `${topic.name} — Flashcards`;
        document.getElementById('topic-emoji').textContent = topic.emoji;
        document.getElementById('topic-name').textContent = topic.name;
        document.getElementById('topic-count').textContent = `${topic.cards.length} flashcards`;

        document.getElementById('fsrs-mode-toggle').checked = isFSRS;
        updateFsrsToggleStyle(isFSRS);

        // Initialize tracker
        initTracker().then(() => {
            console.log("Tracker ready for user:", tracker.userId);
            if (isFSRS) {
                deck = tracker.getDueCards(topicId, fullDeck);
            }
            document.getElementById('total-num').textContent = deck.length;
            document.getElementById('score-remaining').textContent = deck.length;

            toggleJudgeRow();
            updateProgress();
            renderCard();
            buildList();
        });

        // === FSRS GLOBAL TOGGLE ===
        function toggleFSRS() {
            const cb = document.getElementById('fsrs-mode-toggle');
            isFSRS = cb.checked;
            localStorage.setItem('fsrs_mode', isFSRS);
            updateFsrsToggleStyle(isFSRS);

            // Reload deck depending on mode
            if (isFSRS) {
                deck = tracker.getDueCards(topicId, fullDeck);
            } else {
                deck = [...fullDeck];
            }
            currentIndex = 0;
            known.clear();
            unknown.clear();
            [1, 2, 3, 4].forEach(r => fsrsRatings[r].clear());

            document.getElementById('total-num').textContent = deck.length;
            document.getElementById('score-remaining').textContent = deck.length;

            toggleJudgeRow();
            updateProgress();
            renderCard();
            buildList();

            document.getElementById('flashcard-mode').classList.remove('hidden');
            document.getElementById('completion-screen').classList.remove('active');
        }

        function updateFsrsToggleStyle(isChecked) {
            const track = document.querySelector('.fsrs-track');
            const thumb = document.querySelector('.fsrs-thumb');
            if (isChecked) {
                track.style.background = '#8B5CF6';
                track.style.borderColor = '#6b7280'; // gray
                thumb.style.background = '#ffffff';
                thumb.style.transform = 'translateX(16px)';
            } else {
                track.style.background = 'var(--bg-layer-2)';
                track.style.borderColor = '#6b7280'; // gray
                thumb.style.background = 'var(--text-muted)';
                thumb.style.transform = 'translateX(0)';
            }
        }

        function toggleJudgeRow() {
            document.getElementById('judge-row').style.display = isFSRS ? 'none' : 'flex';
            document.getElementById('fsrs-judge-row').style.display = isFSRS ? 'flex' : 'none';
        }

        // === FLASHCARD ===
        function renderCard() {
            if (deck.length === 0) return;
            const card = deck[currentIndex];
            document.getElementById('card-term').textContent = card.term;
            document.getElementById('card-definition').textContent = card.definition;
            document.getElementById('current-num').textContent = currentIndex + 1;
            document.getElementById('total-num').textContent = deck.length;

            // Unflip
            document.getElementById('flashcard').classList.remove('flipped');

            // Nav button states
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex >= deck.length - 1;

            if (isFSRS && deck.length > 0) {
                updateFsrsPreviews(card.term);
            }
        }

        function updateFsrsPreviews(term) {
            const cardState = (tracker.data.fsrs[topicId] || {})[term] || null;
            const previews = fsrs.getPreviews(cardState);
            previews.forEach(p => {
                document.getElementById(`fsrs-time-${p.rating}`).textContent = p.timeStr;
            });
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < deck.length - 1) {
                currentIndex++;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        }

        function markCard(isKnown) {
            const card = deck[currentIndex];
            const key = card.term;

            // TRACKING: Log individual review
            tracker.logCardReview(topicId, card.term, isKnown);

            if (isKnown) {
                known.add(key);
                unknown.delete(key);
            } else {
                unknown.add(key);
                known.delete(key);
            }
            updateProgress();

            // Auto-advance
            if (currentIndex < deck.length - 1) {
                currentIndex++;
                renderCard();
            } else {
                checkCompletion();
            }
        }

        function markFsrsCard(rating) {
            const card = deck[currentIndex];
            const key = card.term;

            tracker.logFsrsReview(topicId, card.term, rating);

            [1, 2, 3, 4].forEach(r => fsrsRatings[r].delete(key));
            fsrsRatings[rating].add(key);

            if (rating > 1) {
                known.add(key);
                unknown.delete(key);
            } else {
                unknown.add(key);
                known.delete(key);
            }
            updateProgress();

            if (currentIndex < deck.length - 1) {
                currentIndex++;
                renderCard();
            } else {
                checkCompletion();
            }
        }

        function updateProgress() {
            const total = deck.length;
            const reviewed = known.size + unknown.size;
            const pct = Math.round((reviewed / total) * 100) || 0;

            if (isFSRS) {
                document.getElementById('chip-known').style.display = 'none';
                document.getElementById('chip-unknown').style.display = 'none';
                document.getElementById('chip-fsrs-again').style.display = '';
                document.getElementById('chip-fsrs-hard').style.display = '';
                document.getElementById('chip-fsrs-good').style.display = '';
                document.getElementById('chip-fsrs-easy').style.display = '';

                document.getElementById('score-fsrs-again').textContent = fsrsRatings[1].size;
                document.getElementById('score-fsrs-hard').textContent = fsrsRatings[2].size;
                document.getElementById('score-fsrs-good').textContent = fsrsRatings[3].size;
                document.getElementById('score-fsrs-easy').textContent = fsrsRatings[4].size;
            } else {
                document.getElementById('chip-known').style.display = '';
                document.getElementById('chip-unknown').style.display = '';
                document.getElementById('chip-fsrs-again').style.display = 'none';
                document.getElementById('chip-fsrs-hard').style.display = 'none';
                document.getElementById('chip-fsrs-good').style.display = 'none';
                document.getElementById('chip-fsrs-easy').style.display = 'none';

                document.getElementById('score-known').textContent = known.size;
                document.getElementById('score-unknown').textContent = unknown.size;
            }

            document.getElementById('score-remaining').textContent = total - reviewed;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent = pct + '% complete';

            // Update list styles
            document.querySelectorAll('.list-item').forEach(item => {
                const term = item.dataset.term;
                item.classList.toggle('known', known.has(term));
            });
        }

        function checkCompletion() {
            const reviewed = known.size + unknown.size;
            if (reviewed >= deck.length) {
                // TRACKING: Log session completion
                if (isFSRS) {
                    tracker.logSession(topicId, topic.name, known.size, unknown.size, deck.length, {
                        again: fsrsRatings[1].size,
                        hard: fsrsRatings[2].size,
                        good: fsrsRatings[3].size,
                        easy: fsrsRatings[4].size
                    });
                } else {
                    tracker.logSession(topicId, topic.name, known.size, unknown.size, deck.length);
                }

                document.getElementById('flashcard-mode').classList.add('hidden');
                document.getElementById('list-mode').classList.remove('active');
                const screen = document.getElementById('completion-screen');
                screen.classList.add('active');
                const pct = Math.round((known.size / deck.length) * 100);
                document.getElementById('result-text').innerHTML =
                    `You knew <strong>${known.size}</strong> out of <strong>${deck.length}</strong> terms (${pct}%).<br>` +
                    (unknown.size > 0 ? `<strong>${unknown.size}</strong> terms need more practice.` : `Perfect score! 🎉`);
            }
        }

        // === DECK CONTROLS ===
        function shuffleDeck() {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            currentIndex = 0;
            renderCard();
            buildList();
        }

        function resetDeck() {
            if (isFSRS) {
                deck = tracker.getDueCards(topicId, fullDeck);
            } else {
                deck = [...fullDeck];
            }
            currentIndex = 0;
            known.clear();
            unknown.clear();
            [1, 2, 3, 4].forEach(r => fsrsRatings[r].clear());
            updateProgress();
            renderCard();
            buildList();
            document.getElementById('flashcard-mode').classList.remove('hidden');
            document.getElementById('completion-screen').classList.remove('active');
            if (mode === 'list') {
                document.getElementById('list-mode').classList.add('active');
            }
            document.getElementById('score-remaining').textContent = deck.length;
        }

        function reviewUnknown() {
            if (unknown.size === 0) return;
            if (isFSRS) {
                deck = deck.filter(c => unknown.has(c.term));
            } else {
                deck = fullDeck.filter(c => unknown.has(c.term));
            }
            currentIndex = 0;
            known.clear();
            unknown.clear();
            [1, 2, 3, 4].forEach(r => fsrsRatings[r].clear());
            updateProgress();
            renderCard();
            buildList();
            setMode('card');
            document.getElementById('flashcard-mode').classList.remove('hidden');
            document.getElementById('completion-screen').classList.remove('active');
            document.getElementById('total-num').textContent = deck.length;
            document.getElementById('score-remaining').textContent = deck.length;
        }

        // === MODE TOGGLE ===
        function setMode(m) {
            mode = m;
            document.getElementById('btn-card-mode').classList.toggle('active', m === 'card');
            document.getElementById('btn-list-mode').classList.toggle('active', m === 'list');
            document.getElementById('flashcard-mode').classList.toggle('hidden', m !== 'card');
            document.getElementById('list-mode').classList.toggle('active', m === 'list');
        }

        // === LIST MODE ===
        function buildList() {
            const container = document.getElementById('list-mode');
            container.innerHTML = '';
            deck.forEach(card => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.dataset.term = card.term;
                if (known.has(card.term)) item.classList.add('known');
                item.innerHTML = `
                    <div class="list-term">${card.term}</div>
                    <div class="list-definition">${card.definition}</div>
                `;
                item.addEventListener('click', () => item.classList.toggle('revealed'));
                container.appendChild(item);
            });
        }

        // === SEARCH ===
        document.getElementById('card-search').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            if (mode === 'list') {
                document.querySelectorAll('.list-item').forEach(item => {
                    const text = item.textContent.toLowerCase();
                    item.style.display = text.includes(q) ? '' : 'none';
                });
            } else {
                // In card mode, filter deck and reset
                let currentPool = isFSRS ? tracker.getDueCards(topicId, fullDeck) : fullDeck;
                if (q === '') {
                    deck = [...currentPool];
                } else {
                    deck = currentPool.filter(c =>
                        c.term.toLowerCase().includes(q) || c.definition.toLowerCase().includes(q)
                    );
                }
                currentIndex = 0;
                if (deck.length > 0) renderCard();
                document.getElementById('total-num').textContent = deck.length;
            }
        });

        // === KEYBOARD SHORTCUTS ===
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case ' ':
                case 'Enter': e.preventDefault(); flipCard(); break;
                case 'ArrowRight': nextCard(); break;
                case 'ArrowLeft': prevCard(); break;
                case '1': markCard(false); break;
                case '2': markCard(true); break;
            }
        });

        // === SCROLL TO TOP ===
        const scrollBtn = document.getElementById('scroll-top');
        window.addEventListener('scroll', () => {
            scrollBtn.classList.toggle('visible', window.scrollY > 300);
        });
        scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // === THEME TOGGLE ===
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // Init icon on load
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme') || 'dark';
            updateThemeIcon(saved);
        });
    </script>
</body>

</html>
